# AniVerse — deploy estático na Netlify
[build]
  publish = "."
  # Sem build step: HTML/CSS/JS + data/posts.json

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/category"
  to = "/category.html"
  status = 200

[[redirects]]
  from = "/post"
  to = "/post.html"
  status = 200
